# Fly.io configuration for cratesio-mcp
# Deploy with: fly deploy

app = "cratesio-mcp"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep the single machine always-on (no idle auto-stop/suspend). When the app
  # is briefly down, real client traffic backs off, so a freshly-deployed machine
  # is immediately idle -- auto-stop then stops it before traffic returns, leaving
  # zero serving machines (the HTTP 000 outage we hit). For a small always-on
  # service this lifecycle churn isn't worth it; just keep the machine running.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
  [http_service.concurrency]
    type = "requests"
    hard_limit = 35
    soft_limit = 25

  # Fly-managed HTTP health check on /health. A failing check makes a deploy
  # fail (instead of "succeeding" while the app serves nothing -- the gap that
  # hid the v0.2.0 outage) and stops the proxy routing to an unhealthy machine.
  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
